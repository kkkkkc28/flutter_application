<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="flutter_application_1">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>登录</title>
  <link rel="manifest" href="manifest.json">
  <style>
    html, body {
      margin: 0;
      height: 100%;
      overflow: hidden;
      background: linear-gradient(135deg, #0f766e 0%, #134e4a 50%, #0c4a6e 100%);
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    }

    flutter-view,
    flt-glass-pane,
    flt-scene-host,
    flt-scene {
      background-color: transparent !important;
    }

    #splash {
      position: fixed;
      inset: 0;
      z-index: 999999;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #fff;
      background: linear-gradient(135deg, #0f766e 0%, #134e4a 50%, #0c4a6e 100%);
      will-change: opacity;
    }

    .splash-icon {
      width: 72px;
      height: 72px;
      border: 3px solid rgba(255, 255, 255, 0.9);
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      animation: pulse 1.4s ease-in-out infinite;
    }

    .splash-icon svg {
      width: 36px;
      height: 36px;
      fill: rgba(255, 255, 255, 0.95);
    }

    .splash-title {
      margin: 20px 0 0;
      font-size: 28px;
      font-weight: 700;
      line-height: 1.2;
    }

    .splash-subtitle {
      margin: 10px 0 0;
      font-size: 16px;
      line-height: 1.4;
      opacity: 0.75;
    }

    .splash-spinner {
      margin-top: 36px;
      width: 28px;
      height: 28px;
      border: 2.4px solid rgba(255, 255, 255, 0.25);
      border-top-color: rgba(255, 255, 255, 0.85);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(0.92); }
      50% { transform: scale(1); }
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
  <script>
    window.splashAnimationStart = Date.now();

    window.removeNativeSplash = function () {
      var splash = document.getElementById('splash');
      if (!splash) return;
      splash.remove();
    };
  </script>
</head>
<body>
  <div id="splash">
    <div class="splash-icon">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/>
      </svg>
    </div>
    <p class="splash-title">欢迎回来</p>
    <p class="splash-subtitle">正在加载应用…</p>
    <div class="splash-spinner"></div>
  </div>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
